--- # list of characters
# ---------------- SONAS -------------------
perry:
  name: Perry
  colour: "#DEE9F3"
  stroke: "#3F414F"
  flags:
    - bi
    - canada
  species: Canada jay
  pronouns: he/him
  gender: Male
  age: My age :>
  height: 5' 10"
  smell: Snow?
  bio: |
    Perry is my primary fursona ,, but he wasn't at first ! He was originally a random OC, even having a last name at first (I used to follow a naming convention for OCs where I'd derive a first and last name based off of their species name). I eventually adopted him as my main fursona cuz I love birds & felt like being one suited me :)
    
    As a character, Perry is friendly, sweet, excitable and likes attention,, he enjoys nature & landscapes . likes being held and pet ,, plays roguelike/lites and 3d platformers, listens to jazz and various vgm; the art guy .
ode:
  name: Ode
  colour: "#43385C"
  stroke: "#9085E4"
  flags:
    - bi
    - canada
  species: White-tailed deer
  pronouns: he/him
  gender: Male
  age: My age :>
  height: 5' 10"
  smell: Pine needles
  bio: |
    Ode is my other fursona, in the sense that he represents the other parts of my personality ! He is a deer because that's the animal I originally conceived my fursona as, before I had made Perry . Ode is not the exact opposite of Perry ,, he's unique in his own ways . has an astronomy theme going with him also
    
    Ode is more shy and an introvert , but super chill tho ,, he's quiet but can go on tangents, particularly with stuff that interests him . gains a lot of confidence only if he feels comfortable, so it's good to be affectionate towards him . plays fps and puzzle games, also retro games . listens to ambient, jungle and DnB; the programmer guy .
